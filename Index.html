<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff8f3, #fbe7ff);
            text-align: center;
            color: #4d004d;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.15);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 42px;
            color: #8B008B;
        }

        h2 {
            margin-top: 10px;
            font-size: 22px;
            font-weight: 400;
        }

        .names {
            font-size: 42px;
            font-family: 'Cinzel', serif;
            margin: 25px 0;
            color: #b3005f;
            line-height: 1.4;
        }

        .date {
            font-size: 28px;
            font-weight: bold;
            margin: 15px;
        }

        .details {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 5px 12px rgba(0,0,0,.2);
            object-fit: cover;
        }

        .button {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background: #8B008B;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            transition: .3s;
        }

        .button:hover {
            background: #b3005f;
        }

        .footer {
            margin-top: 25px;
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Wedding Invitation</h1>

        <h2>Together with our families</h2>

        <div class="names">
            Chalana Prabhakar<br>
            &<br>
            Nagarjun
        </div>

        <div class="date">
            23 August
        </div>

        <div class="details">
            📍 <b>Sri H D Devegowda Convention Hall</b><br>
            Near Railway Station,<br>
            KR Nagar<br><br>

            🕙 Muhurtham<br>
            <b>10:05 AM – 10:55 AM</b>
        </div>

        <div class="gallery">
            <img src="photo1.jpg" alt="Wedding Photo 1">
            <img src="photo2.jpg" alt="Wedding Photo 2">
            <img src="photo3.jpg" alt="Wedding Photo 3">
        </div>

        <a class="button" href="https://maps.google.com/?q=Sri+H+D+Devegowda+Convention+Hall+KR+Nagar" target="_blank">
            View Location
        </a>

        <div class="footer">
            We request the pleasure of your presence<br>
            to bless us on our special day.
        </div>

    </div>

</body>
</html>
